name: Update ACL Policy from Modular Files

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to combine (production or development)'
        required: true
        type: choice
        options:
          - production
          - development
        default: 'production'

jobs:
  combine-and-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch the branch that triggered this workflow
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run ACL combiner
        run: |
          cd tailscale-acl-combiner
          python3 combine.py ${{ inputs.environment }}

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet policy.hujson; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected in policy.hujson"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected in policy.hujson"
          fi

      - name: Commit changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add policy.hujson
          git commit -m "Update policy.hujson from ${{ inputs.environment }} environment

          Combined ACL files using tailscale-acl-combiner
          Environment: ${{ inputs.environment }}

          Co-Authored-By: Claude Sonnet 4.5 <noreply@anthropic.com>"

      - name: Push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git push origin ${{ github.ref_name }}

      - name: Create Pull Request
        if: steps.check_changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Extract branch name
          BRANCH_NAME="${{ github.ref_name }}"

          # Create PR
          gh pr create \
            --title "Update Tailscale ACL policy from ${{ inputs.environment }} environment" \
            --body "$(cat <<'EOF'
          ## Summary

          This PR updates the `policy.hujson` file by combining modular ACL configurations from the **${{ inputs.environment }}** environment.

          ### Changes
          - Combined files from `tailscale-acl-combiner/${{ inputs.environment }}/`
          - Updated groups, tag owners, hosts, and posture rules
          - Preserved existing grants, SSH rules, and auto-approvers

          ### Files Modified
          - `policy.hujson`

          ### Test Plan
          - [ ] Review the changes in `policy.hujson`
          - [ ] Verify groups and tag owners are correct
          - [ ] Verify hosts and posture rules are as expected
          - [ ] Check that existing grants and SSH rules are preserved
          - [ ] Run ACL tests in the pipeline
          - [ ] Apply to Tailscale after merge

          ---

          🤖 Generated by [Claude Code](https://claude.com/claude-code) using the `update-acl-policy` workflow
          EOF
          )" \
            --base main \
            --head "$BRANCH_NAME"

      - name: No changes detected
        if: steps.check_changes.outputs.has_changes == 'false'
        run: |
          echo "ℹ️ No changes detected in policy.hujson after combining ${{ inputs.environment }} files"
          echo "The modular files may already be in sync with policy.hujson"
          exit 0

      - name: Workflow summary
        if: always()
        run: |
          echo "## ACL Combiner Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Changes Detected**: ${{ steps.check_changes.outputs.has_changes }}" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.check_changes.outputs.has_changes }}" == "true" ]; then
            echo "- **Status**: ✅ PR created successfully" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "A pull request has been created with the updated policy.hujson file." >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Status**: ℹ️ No changes needed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The policy.hujson file is already up to date with the modular files." >> $GITHUB_STEP_SUMMARY
          fi
